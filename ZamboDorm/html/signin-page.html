<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZamboDorm – Sign In</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%237c3aed;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' ry='6' fill='url(%23grad)'/%3E%3Cpath d='M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V9.5Z' fill='white' fill-opacity='0.95'/%3E%3Crect x='9' y='14' width='6' height='7' rx='1' fill='rgba(124,58,237,0.65)'/%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/utilities.css"/>
  <link rel="stylesheet" href="../css/signin-page.css"/>
  <script src="../js/user-manager.js"></script>
  <script src="../js/navbar.js"></script>
</head>
<body>

  <!-- Navbar Web Component -->
  <zd-navbar></zd-navbar>
  <script src="../js/hamburger.js"></script>
  <script src="../js/navbar-scroll.js"></script>

  <!-- ── MAIN ── -->
  <main class="page-wrapper">
    <div class="signin-card">

      <!-- Header -->
      <div class="signin-card__header">
        <div class="signin-card__brand">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V9.5Z" fill="white" fill-opacity="0.95"/>
            <rect x="9" y="14" width="6" height="7" rx="1" fill="rgba(124,58,237,0.55)"/>
          </svg>
        </div>
        <h1 class="signin-card__title">Welcome Back</h1>
        <p class="signin-card__subtitle">Sign in to continue to <span>ZamboDorm</span></p>
      </div>

      <!-- Form -->
      <form id="signinForm" novalidate>
        <div id="errorBox" class="signin-card__error">
          <svg class="signin-card__error-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          <span>Please enter both email and password</span>
        </div>
        <div class="form-group">
          <label class="form__label" for="email">Email Address</label>
          <div class="form__input-wrap">
            <span class="form__input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <input class="form__input" id="email" type="email" placeholder="your.email@example.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form__label" for="password">Password</label>
          <div class="form__input-wrap">
            <span class="form__input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form__input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required/>
            <button type="button" class="form__password-toggle" id="pwToggle" aria-label="Toggle password">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form__actions">
          <a href="#" class="form__forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="signinBtn">
          <span class="form__btn-label">Sign In</span>
          <svg class="form__btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
          <div class="form__btn-spinner"></div>
        </button>

        <div class="form__divider">or</div>

        <button type="button" class="btn w-full" onclick="window.location.href='./register-account.html'">
          Create New Account
        </button>
      </form>

      <!-- Demo Accounts -->
      <div class="signin-card__demo">
        <div class="signin-card__demo-header">
          <span class="signin-card__demo-badge">Demo</span>
          <span class="signin-card__demo-title">Quick Access Accounts</span>
        </div>
        <div class="signin-card__demo-accounts"></div>
      </div>

      <!-- Secure note -->
      <p class="signin-card__footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        Secure login powered by ZamboDorm Management System
      </p>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="../js/signin-page.js"></script>
</body>
</html>
