    <main class="main-content" id="mainContent">

      <!-- Page Header Row -->
      <div class="page-header prop-header">
        <div>
          <h1 class="page-title">Property Management</h1>
          <p class="page-subtitle">Manage registered dormitory properties</p>
        </div>
        <button class="btn-add" id="openAddModal">＋ Add New Property</button>
      </div>

      <!-- Properties Table Card -->
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">All Properties</span>
          <span class="prop-count-badge" id="propCount"></span>
        </div>
        <div class="table-wrapper">
          <table class="prop-table">
            <thead>
              <tr>
                <th>Property Name</th>
                <th>Owner</th>
                <th>Address</th>
                <th>Rooms</th>
                <th>Date Added</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="propTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="propModal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Add New Property</h2>
      <button class="modal-close" id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label required">Property Name</label>
        <input class="form-input" id="fieldName" type="text"
               placeholder="Enter property name" />
        <span class="form-error" id="errName"></span>
      </div>
      <p class="form-section-label">Owner Name</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">First Name</label>
          <input class="form-input" id="fieldFirst" type="text"
                 placeholder="First name" />
          <span class="form-error" id="errFirst"></span>
        </div>
        <div class="form-group">
          <label class="form-label required">Middle Name</label>
          <input class="form-input" id="fieldMiddle" type="text"
                 placeholder="Middle name" />
          <span class="form-error" id="errMiddle"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">Last Name</label>
          <input class="form-input" id="fieldLast" type="text"
                 placeholder="Last name" />
          <span class="form-error" id="errLast"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Suffix</label>
          <input class="form-input" id="fieldSuffix" type="text"
                 placeholder="e.g. Jr., III (optional)" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Address</label>
        <textarea class="form-input form-textarea" id="fieldAddress"
                  placeholder="Full street address"></textarea>
        <span class="form-error" id="errAddress"></span>
      </div>
      <div class="form-group">
        <label class="form-label required">Number of Rooms</label>
        <input class="form-input" id="fieldRooms" type="number"
               min="1" placeholder="e.g. 20" />
        <span class="form-error" id="errRooms"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Date Added</label>
        <input class="form-input" id="fieldDate" type="text"
               readonly disabled />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-save" id="saveModal">Save Property</button>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteOverlay"></div>
  <div class="modal modal--sm" id="deleteModal">
    <div class="modal-header">
      <h2 class="modal-title">Delete Property</h2>
      <button class="modal-close" id="closeDelete">&times;</button>
    </div>
    <div class="modal-body">
      <p class="delete-msg">Are you sure you want to delete
        <strong id="deleteName"></strong>?
        This action cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelDelete">Cancel</button>
      <button class="btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>

  <script src="../js/tenant-sidebar-hamburger.js"></script>
  <script src="../js/sysadmin-properties.js"></script>
</body>
</html>
