<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Logs — ZamboDorm</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/guard-style.css" />
  <link rel="stylesheet" href="../css/sidebar-hamburger.css" />

  <!-- Load user manager and navbar before body to ensure navbar renders correctly -->
  <script src="../js/user-manager.js"></script>
  <script src="../js/navbar.js"></script>
  <link rel="stylesheet" href="../css/chatbot.css">
  <script src="../js/chatbot.js" defer></script>
</head>
<body>

  <!-- Navbar Web Component -->
  <zd-navbar authenticated></zd-navbar>
  <script src="../js/navbar-scroll.js"></script>
<div class="sidebar-overlay" id="overlay"></div>

<!-- Mobile Sidebar Hamburger (Reusable) -->
<button class="sidebar-hamburger" id="sidebarHamburger" aria-label="Open sidebar">
  <span></span><span></span><span></span>
</button>
<script src="../js/tenant-sidebar-hamburger.js"></script>

<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-item" data-page="dashboard.html" href="../html/guard-dashboard.html">
        <svg class="sidebar-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="sidebar-item" data-page="add-visitor.html" href="../html/add-visitor.html">
        <svg class="sidebar-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Add Visitor</span>
      </a>
      <a class="sidebar-item" data-page="current-visitors.html" href="../html/current-visitors.html">
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Current Visitors</span>
      </a>
      <a class="sidebar-item active" data-page="visitor-logs.html" href="visitor-logs.html">
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Visitor Logs</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h1>Visitor Logs
      <p>Complete record of all dorm visitors. Use filters to search or narrow down entries.</p>
      </h1>
    </div>

    <!-- TABS -->
    <div class="tab-pills">
      <button class="tab-pill active" onclick="setTab('all', this)">All Records</button>
      <button class="tab-pill" onclick="setTab('today', this)">Today</button>
      <button class="tab-pill" onclick="setTab('inside', this)">Currently Inside</button>
      <button class="tab-pill" onclick="setTab('done', this)">Completed</button>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <input class="filter-input" id="f-search" type="text" placeholder="Search visitor name…" oninput="render()" style="min-width:220px;" />
      <input class="filter-input" id="f-room" type="text" placeholder="Room…" oninput="render()" style="width:100px;" />
      <input class="filter-input" id="f-date" type="date" onchange="render()" />
      <button class="btn-secondary" style="padding:0.5rem 1rem;font-size:0.82rem;" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div class="section" style="padding:0;overflow:hidden;">
      <div id="logs-wrap"></div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>Edit Visitor Name</h2>
    <p>Correct any errors in the visitor's name entries.</p>
    <input type="hidden" id="edit-id" />
    <div class="form-row triple">
      <div class="form-group">
        <label class="form-label">First Name *</label>
        <input class="form-input" id="edit-first" type="text" placeholder="First name" />
      </div>
      <div class="form-group">
        <label class="form-label">Last Name *</label>
        <input class="form-input" id="edit-last" type="text" placeholder="Last name" />
      </div>
      <div class="form-group">
        <label class="form-label">M.I. <span class="optional">(opt.)</span></label>
        <input class="form-input" id="edit-mi" type="text" placeholder="e.g. R" maxlength="3" style="text-transform:uppercase;" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-save-sm" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Done!</span>
</div>

<script src="../js/guard-data-main.js"></script>
<script src="../js/visitor-logs-script.js"></script>
<script>
  /* ── Sync Guard Info & Navbar Customization ── */
  (function() {
    const guardName = localStorage.getItem('guardName') || localStorage.getItem('currentGuard') || 'Guard Narvaez';
    if (typeof UserManager !== 'undefined') {
      const currentUser = UserManager.getUser();
      if (!currentUser || currentUser.name !== guardName) {
        UserManager.setUser({ name: guardName, role: 'guard' });
      }
    }

    function injectClock() {
      const navbarInner = document.querySelector('zd-navbar .navbar__inner');
      if (navbarInner && !document.getElementById('clock')) {
        const clock = document.createElement('div');
        clock.id = 'clock';
        const logo = navbarInner.querySelector('.logo');
        if (logo) logo.after(clock);
        else navbarInner.prepend(clock);
        tickClock();
        setInterval(tickClock, 1000);
      }
    }

    function tickClock() {
      const el = document.getElementById('clock');
      if (!el) return;
      el.textContent = new Date().toLocaleString('en-PH', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', injectClock);
    } else {
      setTimeout(injectClock, 0);
    }
  })();
</script>
</body>
</html>
