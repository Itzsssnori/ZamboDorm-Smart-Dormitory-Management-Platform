<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Logs — ZamboDorm</title>
  <link rel="stylesheet" href="guard-style.css" />
</head>
<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="app-body">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <a class="sidebar-item" data-page="dashboard.html" href="guard-dashboard.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </a>
    <a class="sidebar-item" data-page="add-visitor.html" href="add-visitor.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add Visitor
    </a>
    <a class="sidebar-item" data-page="current-visitors.html" href="current-visitors.html">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Current Visitors
    </a>
    <a class="sidebar-item active" data-page="visitor-logs.html" href="visitor-logs.html">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Visitor Logs
    </a>
    <div class="sidebar-divider"></div>
    <button class="sidebar-item danger" onclick="handleLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout
    </button>
  </nav>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Visitor Logs</h1>
        <p>Complete record of all dorm visitors. Use filters to search or narrow down entries.</p>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-pills">
      <button class="tab-pill active" onclick="setTab('all', this)">All Records</button>
      <button class="tab-pill" onclick="setTab('today', this)">Today</button>
      <button class="tab-pill" onclick="setTab('inside', this)">Currently Inside</button>
      <button class="tab-pill" onclick="setTab('done', this)">Completed</button>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <input class="filter-input" id="f-search" type="text" placeholder="Search visitor name…" oninput="render()" style="min-width:220px;" />
      <input class="filter-input" id="f-room" type="text" placeholder="Room…" oninput="render()" style="width:100px;" />
      <input class="filter-input" id="f-date" type="date" onchange="render()" />
      <button class="btn-secondary" style="padding:0.5rem 1rem;font-size:0.82rem;" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div class="section" style="padding:0;overflow:hidden;">
      <div id="logs-wrap"></div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>Edit Visitor Name</h2>
    <p>Correct any errors in the visitor's name entries.</p>
    <input type="hidden" id="edit-id" />
    <div class="form-row triple">
      <div class="form-group">
        <label class="form-label">First Name *</label>
        <input class="form-input" id="edit-first" type="text" placeholder="First name" />
      </div>
      <div class="form-group">
        <label class="form-label">Last Name *</label>
        <input class="form-input" id="edit-last" type="text" placeholder="Last name" />
      </div>
      <div class="form-group">
        <label class="form-label">M.I. <span class="optional">(opt.)</span></label>
        <input class="form-input" id="edit-mi" type="text" placeholder="e.g. R" maxlength="3" style="text-transform:uppercase;" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-save-sm" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Done!</span>
</div>

<script src="guard-data-main.js"></script>
<script src="visitor-logs-script.js"></script>
</body>
</html>
