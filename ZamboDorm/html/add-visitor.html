<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Visitor — ZamboDorm</title>
  <link rel="stylesheet" href="guard-style.css" />
</head>
<body>

<!-- NAVBAR -->
<div id="navbar">
  <a class="logo" href="guard-dashboard.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <span class="logo-text">Zambo<span>Dorm</span></span>
  </a>
  <div id="clock"></div>
  <div class="guard-pill">
    <div class="guard-avatar">GN</div>
    <span class="guard-name">Guard Narvaez</span>
  </div>
  <button class="btn-logout" onclick="handleLogout()">Logout</button>
</div>

<div class="app-body">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <a class="sidebar-item" data-page="dashboard.html" href="guard-dashboard.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </a>
    <a class="sidebar-item active" data-page="add-visitor.html" href="add-visitor.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add Visitor
    </a>
    <a class="sidebar-item" data-page="current-visitors.html" href="current-visitors.html">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Current Visitors
    </a>
    <a class="sidebar-item" data-page="visitor-logs.html" href="visitor-logs.html">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Visitor Logs
    </a>
    <div class="sidebar-divider"></div>
    <button class="sidebar-item danger" onclick="handleLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout
    </button>
  </nav>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h1>Add Visitor</h1>
      <p>Fill in the details below to log a new visitor's time in.</p>
    </div>

    <div style="display:flex;justify-content:center;">
    <div class="form-card" style="width:100%;max-width:620px;">

      <!-- NAME ROW: Last | First | MI -->
      <div class="form-row triple">
        <div class="form-group">
          <label class="form-label">Last Name *</label>
          <input class="form-input" id="f-last" type="text" placeholder="e.g. Dela Cruz" />
        </div>
        <div class="form-group">
          <label class="form-label">First Name *</label>
          <input class="form-input" id="f-first" type="text" placeholder="e.g. Juan" />
        </div>
        <div class="form-group">
          <label class="form-label">M.I. <span class="optional">(optional)</span></label>
          <input class="form-input" id="f-mi" type="text" placeholder="e.g. R" maxlength="3" style="text-transform:uppercase;" />
        </div>
      </div>

      <!-- CONTACT -->
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">Contact Number <span class="optional">(optional)</span></label>
          <input class="form-input" id="f-contact" type="text" placeholder="09XX XXX XXXX" />
        </div>
      </div>

      <!-- PERSON TO VISIT + ROOM -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Person to Visit *</label>
          <div class="select-wrap">
            <select class="form-select" id="f-person" onchange="autoFillRoom()">
              <option value="">— Select resident —</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Room Number</label>
          <input class="form-input" id="f-room" type="text" placeholder="Auto-fills on selection" readonly />
        </div>
      </div>

      <!-- PURPOSE -->
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">Purpose of Visit *</label>
          <div class="select-wrap">
            <select class="form-select" id="f-purpose">
              <option value="">— Select purpose —</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ID TYPE -->
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">ID Presented <span class="optional">(optional)</span></label>
          <div class="select-wrap">
            <select class="form-select" id="f-id">
              <option value="">— Select ID type —</option>
            </select>
          </div>
        </div>
      </div>

      <!-- TIME IN (auto) -->
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">Time In</label>
          <input class="form-input" id="f-timein" type="text" readonly />
        </div>
      </div>

      <button class="btn-timein" onclick="submitVisitor()">⏱ TIME IN</button>
    </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div id="toast">
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Done!</span>
</div>

<script src="guard-data-main.js"></script>
<script src="add-visitor-script.js"></script>
</body>
</html>
