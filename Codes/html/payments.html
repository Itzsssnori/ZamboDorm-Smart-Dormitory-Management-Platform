<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments</title>
<link rel="stylesheet" href="payments-styles.css">
</head>

<body>

<!-- HEADER SPACE -->
<header class="header-space"></header>

<main class="container">

<div class="title-row">
<h1>Billing History</h1>
<button class="pay-btn">Make Payment</button>
</div>

<div class="billing-card">

<div class="bill">
<div>
<h3>February 2026</h3>
<p>Due Feb 07</p>
</div>

<div class="right">
<h3>₱4,500</h3>
<span class="unpaid">UNPAID</span>
</div>
</div>


<div class="bill">
<div>
<h3>January 2026</h3>
<p>Paid Jan 05</p>
</div>

<div class="right">
<h3>₱4,500</h3>
<span class="paid">PAID</span>
</div>
</div>


<div class="bill">
<div>
<h3>December 2025</h3>
<p>Paid Dec 04</p>
</div>

<div class="right">
<h3>₱4,500</h3>
<span class="paid">PAID</span>
</div>
</div>


<div class="bill">
<div>
<h3>November 2025</h3>
<p>Paid Nov 05</p>
</div>

<div class="right">
<h3>₱4,500</h3>
<span class="paid">PAID</span>
</div>
</div>

</div>

</main>

<!-- FOOTER SPACE -->
<footer class="footer-space"></footer>

</body>
</html>
