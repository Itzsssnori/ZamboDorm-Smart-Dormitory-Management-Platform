<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Announcements</title>
  <link rel="stylesheet" href="announcements.css">
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>Manage Announcements</h1>
    <button class="new-post">+ New Post</button>
  </div>

  <!-- Announcement Card -->
  <div class="card">
    <div class="card-left">
      <h2>General Dorm Cleaning</h2>
      <p>Posted on Feb 03, 2026 • Visibility: All Tenants</p>
    </div>
    <div class="card-right">
      <span class="status published">Published</span>
      <span class="menu">⋮</span>
    </div>
  </div>

  <div class="card">
    <div class="card-left">
      <h2>Water Interruption Notice</h2>
      <p>Posted on Jan 28, 2026 • Visibility: Building A</p>
    </div>
    <div class="card-right">
      <span class="status archived">Archived</span>
      <span class="menu">⋮</span>
    </div>
  </div>

  <div class="card">
    <div class="card-left">
      <h2>New Visitor Policy</h2>
      <p>Posted on Jan 15, 2026 • Visibility: All Tenants</p>
    </div>
    <div class="card-right">
      <span class="status published">Published</span>
      <span class="menu">⋮</span>
    </div>
  </div>

</div>

</body>
</html>
